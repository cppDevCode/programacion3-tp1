<!DOCTYPE html>
<html>
<head>
  <title> Pedidos </title>
</head>

<form style="text-align: center;">
<h1> Haz tu pedido </h1> 
  <p> Completando el siguiente formulario </p>
</form>

<form style="text-align: center;">
<form action="https://httpbin.org/post" method="POST" target ="_blank"> <!-- verificar el link!-->
  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" name="nombre" required>
  <br>
  <label for="apellido"> Apellido: </label>
  <input type = "text" id="apellido" name ="apellido" required>
  <br>
   <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>
  <br>
  <label for = "opciones_de_pago"> Opciones de pago </label>
  <select id = "opciones_de_pago" name = "opciones_de_pago">
    <option value="debito"> Débito </option>
    <option value="credito"> Crédito </option>
  </select>
  <br>
  <label for = "numero_tarjeta"> Número de tarjeta </label>
  <input type = "number" id="numero_tarjeta" name = "numero_tarjeta">
  <br>
  <label for = "vencimiento"> Vencimiento </label>
  <input type = "month" id = "vencimiento" name ="vencimiento"> <!--el tipo "date" hace mm/dd/yyyy-->
  <br>
  <label for = "cvv"> Código de seguridad </label>
  <input type ="number" id ="cvv" name="cvv">
  <br>
  <button type="submit">Pedir</button>
</form>
