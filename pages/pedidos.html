<!DOCTYPE html>
<html>
<head>
    <!--Esto lo copié del wpp del grupo que subió Julian-->
    <!-- label { aplica los cambios a las <labels>
  display: inline-block; significa que el bloque tiene el mismo ancho q la linea
  width: 150px;
}

input, select {
  margin-bottom: 10px;
} esto me alinea los campos del formulario, es del CSS-->
    <title> Pedidos </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
  </head>

<body>
<div class = "titulo_pedidos"> 
  <h1> Haz tu pedido </h1> 
  <p> Completando el siguiente formulario </p>
</div>

<form action="https://httpbin.org/post" method="POST" target ="_blank"
class = "form_pedidos"> <!-- verificar el link!-->
  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" name="nombre" required>
  <label for="apellido"> Apellido: </label>
  <input type = "text" id="apellido" name ="apellido" required>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>
  <label for = "opciones_de_pago"> Opciones de pago </label>
  <select id = "opciones_de_pago" name = "opciones_de_pago">
    <option value="debito"> Débito </option>
    <option value="credito"> Crédito </option>
  </select>
  <label for = "numero_tarjeta"> Número de tarjeta </label>
  <input type = "number" id="numero_tarjeta" name = "numero_tarjeta" min = "0" max = "9999 9999 9999 9999">
  <label for = "vencimiento"> Vencimiento </label>
  <input type = "month" id = "vencimiento" name ="vencimiento"> <!--el tipo "date" hace mm/dd/yyyy-->
  <label for = "cvv"> Código de seguridad </label>
  <input type ="number" id ="cvv" name="cvv" min = "0" max = "999">
  <br>
  <button type="submit">Pedir</button>
</form>
</body>
</html>
