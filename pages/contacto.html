<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Formulario de Contacto</h1>
    <div id="menu-links">
        <nav>
            <ul>
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./pages/servicios.html">Servicios</a></li>

            </ul>
        </nav>
    </div>
    </header>

    <form action="#" method="post">
        <!--Nombre, apellido, correo electrónico y mensaje son campos obligatorios.-->
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="apellido">Apellido:</label><br>
        <input type="text" id="apellido" name="apellido" required><br><br>

        <label for="email">Correo Electrónico:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="50" required></textarea><br><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Resetear">
    </form>
    <main>
        <h1>Formulario de Contacto</h1>
        <button><a href="./index.html">Volver al Inicio</a></button>
    </main>
